<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>天天之家——ChatALE-S1模型</title>
<link rel="icon" href="index.ico" type="image/x-icon">
<style>
    :root {
        --primary-color: #3BDDC6;
        --secondary-color: #FF6666;
        --bg-dark: #1a1a1a;
        --bg-medium: #2b2b2b;
        --bg-light: #333333;
        --text-color: #fff;
        --font-base: 16px;
    }

    body {
        font-family: '黑体', serif;
        margin: 0;
        padding: 20px 10px;
        background: linear-gradient(135deg, var(--bg-medium), var(--bg-dark));
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: var(--text-color);
        font-size: var(--font-base);
    }

    .container {
        width: 95%;
        max-width: 1200px;
        background: rgba(43, 43, 43, 0.9);
        padding: 30px 20px;
        border: 2px solid var(--primary-color);
        border-radius: 20px;
        box-shadow: 0 0 40px rgba(59, 221, 198, 0.3);
        position: relative;
        box-sizing: border-box;
    }

    .container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(45deg, transparent, #3bddc622);
        mask: radial-gradient(circle, transparent 85%, #000 85%);
    }

    h1 {
        margin-bottom: 20px;
        color: var(--primary-color);
        font-weight: bold;
        text-shadow: 0 0 10px var(--primary-color);
        font-size: 2.5rem;
    }

    p {
        font-size: 1.1rem;
        line-height: 0;
        color: #ddd;
        margin: 15px 0;
        text-align: center;
    }

    #chat-box {
        min-height: 50vh;
        max-height: 90vh;
        overflow-y: auto;
        padding: 20px;
        margin: 20px 0;
        background: linear-gradient(135deg, var(--bg-light), var(--bg-medium));
        border-radius: 20px;
        border: 2px solid var(--primary-color);
        box-shadow: 0 0 20px rgba(59, 221, 198, 0.2);
        backdrop-filter: blur(10px);
        width: 100%;
        box-sizing: border-box;
    }

    .user-msg,
    .bot-msg {
        padding: 12px 20px;
        border-radius: 25px;
        margin: 8px 0;
        max-width: 75%;
        clear: both;
        position: relative;
        animation: slideIn 0.3s ease-out;
        word-wrap: break-word;
    }

    .user-msg {
        background: linear-gradient(135deg, var(--primary-color), #64A9FF);
        animation-name: slideInRight;
        float: right;
    }

    .bot-msg {
        background: linear-gradient(135deg, var(--secondary-color), #FF3333);
        animation-name: slideInLeft;
        float: left;
    }

    @keyframes slideInRight {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideInLeft {
        from { transform: translateX(-100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    .input-area {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        width: 100%;
        flex-wrap: wrap;
        justify-content: center;
    }

    #user-input {
        flex: 1;
        padding: 14px;
        background: rgba(43, 43, 43, 0.9);
        border: 2px solid var(--primary-color);
        border-radius: 30px;
        font-size: 1.1rem;
        color: var(--text-color);
        transition: all 0.3s;
        min-width: 250px;
    }

    #user-input:focus {
        outline: none;
        background: rgba(43, 43, 43, 0.95);
        box-shadow: 0 0 15px rgba(59, 221, 198, 0.3);
    }

    button {
        padding: 14px 30px;
        background: linear-gradient(135deg, var(--primary-color), #64A9FF);
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 1.1rem;
        box-shadow: 0 8px 20px rgba(59, 221, 198, 0.3);
        white-space: nowrap;
    }

    button:hover {
        background: linear-gradient(135deg, #2A6DEB, #4A90E2);
        transform: translateY(-2px);
        box-shadow: 0 12px 30px rgba(59, 221, 198, 0.6);
    }

    footer {
        margin-top: 30px;
        text-align: center;
        color: #999;
        font-size: 0.9rem;
    }

    /* 响应式调整 */
    @media (max-width: 768px) {
        :root {
            --font-base: 14px;
        }

        #chat-box {
            min-height: 40vh;
            padding: 15px;
        }

        .input-area {
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #user-input {
            min-width: 80%;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 25px;
        }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
        #chat-box {
            min-height: 50vh;
        }
    }

    @media (min-width: 1200px) {
        .container {
            padding: 40px 30px;
        }
    }
</style>
</head>
<body>
    <h1>ChatALE-S1</h1>
    <p>这是由ytx开发的人工智能大模型！目前处于测试阶段！</p>
	<p>ChatALE-S1 Style beta</p>
	<p>注：智力水平为4~5岁人类！</p>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="输入消息...">
    <button onclick="sendMessage()">发送</button>
    <footer>
        <a href="ChatALE.html">
            <button>返回</button>
        </a>
    </footer>

    <script>
        const rules = [
            {
                keywords: ["你好", "hi", "hello", "您好", "嗨", "哈喽", "早上好", "下午好", "晚上好", "hey", "hola", "こんにちは"],
                responses: ["你好呀！", "很高兴见到你~", "有什么可以帮您？", "嗨，今天过得怎么样？", "您好，很高兴为您服务！", "Hey！有什么新鲜事吗？", "Hola！今天心情如何？"]
            },
            {
                keywords: ["天气", "下雨", "晴天", "阴天", "刮风", "台风", "暴雨", "下雪", "气温", "天气预报", "热", "冷", "湿度", "空气质量"],
                responses: ["建议查看天气预报哦", "今天天气不错！", "记得带伞", "天气变化多端，注意保暖", "出门前记得看看天气情况", "今天有点热，注意防晒！", "冷空气来了，多穿点衣服哦！"]
            },
            {
                keywords: ["再见", "bye", "拜拜", "再会", "下次见", "晚安", "明天见", "goodbye", "see you", "ciao"],
                responses: ["再见！", "下次聊~", "保持联系！", "晚安，好梦！", "明天见，祝您有个美好的一天！", "See you later！", "Ciao！期待下次见面！"]
            },
            {
                keywords: ["谢谢", "感谢", "多谢", "thx", "谢谢您", "感激", "感恩", "merci", "gracias"],
                responses: ["不客气！", "很高兴能帮到您！", "随时为您效劳！", "这是我应该做的！", "感谢您的支持！", "Merci！很高兴为您服务！", "Gracias！祝您一天愉快！"]
            },
            {
                keywords: ["帮助", "帮忙", "求助", "怎么用", "如何使用", "支持", "有问题", "怎么办"],
                responses: ["请问您需要什么帮助？", "我可以帮您解答问题！", "请告诉我您遇到的问题。", "您可以查看帮助文档或联系客服。", "别担心，我会尽力帮您解决！", "有什么我可以协助的吗？"]
            },
            {
                keywords: ["时间", "现在几点", "几点钟", "日期", "今天几号", "星期几", "当前时间"],
                responses: ["现在是" + new Date().toLocaleTimeString(), "今天是" + new Date().toLocaleDateString(), "您可以通过手机或电脑查看时间哦！", "今天是星期" + new Date().getDay(), "时间过得真快，珍惜每一刻！"]
            },
            {
                keywords: ["笑话", "讲个笑话", "搞笑", "幽默", "笑一个", "逗我笑"],
                responses: ["为什么电脑很差劲？因为它有很多问题！", "有一天，一只鸭子走进了药店，问：'你们有葡萄吗？'", "为什么书总是很冷静？因为它有很多页（冷静）！", "你知道为什么数学书总是很难过吗？因为它有太多的问题！", "为什么自行车不能站稳？因为它太累了（two-tired）！"]
            },
            {
                keywords: ["美食", "吃什么", "推荐美食", "好吃的", "餐厅", "点餐", "外卖", "食谱"],
                responses: ["您可以试试附近的意大利餐厅！", "今天可以吃火锅哦！", "推荐您尝试一下日式料理！", "甜点怎么样？最近新开了一家蛋糕店！", "想吃辣的？川菜馆是个不错的选择！", "自己做饭也不错，试试这个食谱吧！"]
            },
            {
                keywords: ["电影", "推荐电影", "看什么电影", "最新电影", "影院", "电影票", "影评"],
                responses: ["最近上映的《XXX》很不错哦！", "您可以看看《XXX》，评分很高！", "喜欢科幻片吗？《XXX》很值得一看！", "最近有一部新片《XXX》，听说很好看！", "想看喜剧还是动作片？我可以推荐哦！"]
            },
            {
                keywords: ["音乐", "推荐音乐", "听什么歌", "最新歌曲", "歌手", "演唱会", "音乐节"],
                responses: ["最近很火的《海阔天空》很好听哦！", "您可以听听《海阔天空》，旋律很棒！", "喜欢摇滚吗？《XXX》乐队的新歌很不错！", "最近有一首新歌《XXX》，推荐给您！", "想听轻松的还是动感的音乐？"]
            },
            {
                keywords: ["运动", "健身", "跑步", "瑜伽", "锻炼", "减肥", "健康"],
                responses: ["今天去跑步了吗？", "健身是个好习惯，坚持下去！", "瑜伽可以帮助放松身心哦！", "锻炼身体，保持健康！", "减肥需要坚持，加油！", "健康是最重要的财富！"]
            },
            {
                keywords: ["旅行", "旅游", "景点", "假期", "度假", "机票", "酒店"],
                responses: ["最近有计划去旅行吗？", "推荐您去XXX，风景很美！", "假期快到了，准备去哪里玩？", "订机票和酒店要提前哦！", "旅行是放松的好方式，享受每一刻！"]
            },
            {
                keywords: ["学习", "读书", "课程", "教育", "考试", "作业", "知识"],
                responses: ["学习是进步的阶梯！", "最近在读什么书？", "有什么课程推荐吗？", "考试加油，相信你能行！", "作业做完了吗？记得复习哦！", "知识就是力量，继续努力！"]
            },
            {
                keywords: ["工作", "加班", "面试", "简历", "职业", "升职", "压力"],
                responses: ["工作辛苦了，注意休息！", "加班不要太累，身体最重要！", "面试加油，展现最好的自己！", "简历写好了吗？需要帮忙吗？", "职业规划很重要，慢慢来！", "压力大的时候，记得放松一下！"]
            },
            {
                keywords: ["宠物", "狗狗", "猫咪", "养宠物", "宠物医院", "宠物食品", "可爱"],
                responses: ["你喜欢狗狗还是猫咪？", "养宠物需要很多耐心哦！", "宠物医院可以解决很多问题！", "宠物食品要选健康的！", "宠物真是太可爱了，对吧？"]
            },
            {
                keywords: ["科技", "手机", "电脑", "互联网", "人工智能", "编程", "创新"],
                responses: ["最近有什么新科技吗？", "手机和电脑是生活必需品！", "互联网改变了我们的生活！", "人工智能真是神奇！", "编程很有趣，试试看吧！", "创新是推动社会进步的动力！"]
            },
            {
                keywords: ["节日", "春节", "圣诞节", "中秋节", "情人节", "礼物", "庆祝","节"],
                responses: ["春节快到了，准备怎么过？", "圣诞节的气氛真棒！", "中秋节记得吃月饼哦！", "情人节有什么计划吗？", "礼物是表达心意的好方式！", "节日是庆祝和团聚的时刻！"]
            },
            {
                keywords: ["购物", "买", "打折", "优惠", "网购", "商场", "支付"],
                responses: ["最近有什么想买的吗？", "打折季到了，快去看看吧！", "网购方便又快捷！", "商场里有很多选择哦！", "支付方式越来越多样化了！"]
            },
            {
                keywords: ["游戏", "电竞", "手游", "主机游戏", "steam", "游戏推荐", "玩家"],
                responses: ["最近在玩什么游戏？", "电竞比赛很精彩！", "手游随时随地都能玩！", "主机游戏体验很棒！", "Steam上有很多好游戏！", "游戏推荐？试试《植物大战僵尸》吧！"]
            },
            {
                keywords: ["新闻", "热点", "时事", "头条", "报道", "最新消息", "社交媒体"],
                responses: ["最近有什么热点新闻吗？", "时事变化真快！", "头条新闻值得关注！", "报道总是让人深思！", "最新消息来了，快看看！", "社交媒体上有很多新鲜事！"]
            }
        ];

        const defaultResponses = ["我不太明白", "可以换个说法吗？","服务器繁忙，请稍后再试"];

        function generateReply(input) {
            input = input.toLowerCase();
            for (const rule of rules) {
                if (rule.keywords.some(keyword => input.includes(keyword))) {
                    return rule.responses[Math.floor(Math.random() * rule.responses.length)];
                }
            }
            return defaultResponses[Math.floor(Math.random() * defaultResponses.length)];
        }

        function sendMessage() {
            const userInput = document.getElementById('user-input').value.trim();
            if (!userInput) return;

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="user-msg">你：${userInput}</div>`;
            
            const reply = generateReply(userInput);
            chatBox.innerHTML += `<div class="bot-msg">ChatALE-S1：${reply}</div>`;

            document.getElementById('user-input').value = "";
            chatBox.scrollTop = chatBox.scrollHeight; // 自动滚动到底部
        }

        // 监听输入框的键盘事件
        document.getElementById('user-input').addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault(); // 阻止默认的换行行为
                sendMessage(); // 发送消息
            } else if (event.key === 'Enter' && event.shiftKey) {
                // 允许 Shift + Enter 换行
                return;
            }
        });
    </script>
</body>
</html>
