<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暂缓开放！</title>
    <link rel="icon" href="index.ico" type="image/x-icon">
    <style>
        body {
            font-family: '黑体', serif;
            margin: 0;
            padding: 40px 20px;
            background: linear-gradient(135deg, #440000, #2a0000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(68, 0, 0, 0.9);
            padding: 40px;
            border: 3px solid #FF6666;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 102, 102, 0.5);
            position: relative;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, #ff666633);
            mask: radial-gradient(circle, transparent 85%, #000 85%);
        }

        h1 {
            margin-bottom: 30px;
            color: #FF6666;
            font-size: 2.5em;
            text-shadow: 0 0 20px #FF6666;
            animation: blink 1.5s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        p {
            font-size: 1.3em;
            line-height: 1.8;
            color: #ffaaaa;
            margin: 20px 0;
            position: relative;
            padding-left: 40px;
        }

        p::before {
            content: '⚠';
            color: #FF6666;
            position: absolute;
            left: 0;
            top: 5px;
            font-size: 1.5em;
            animation: shake 1s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        button {
            padding: 16px 40px;
            background: linear-gradient(135deg, #FF6666, #FF3333);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1em;
            box-shadow: 0 8px 20px rgba(255, 102, 102, 0.3);
            margin-top: 30px;
        }

        button:hover {
            background: linear-gradient(135deg, #CC0000, #FF0000);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 102, 102, 0.6);
        }

        /* 小屏幕设备（如手机） */
        @media (max-width: 767px) {
            body {
                padding: 20px 10px;
            }
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 2em;
            }
            p {
                font-size: 1.1em;
            }
            button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }

        /* 中等屏幕设备（如平板） */
        @media (min-width: 768px) and (max-width: 1023px) {
            .container {
                padding: 30px;
            }
            h1 {
                font-size: 2.2em;
            }
            p {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>暂缓开放</h1>
        <p>本页面暂缓开放！开放时间待定为：2025.6.28</p></div>
        <a href="home.html">
            <button>返回</button>
        </a>
    
</body>
</html>
