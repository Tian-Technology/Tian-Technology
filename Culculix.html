<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culculix - 高性能计算工具</title>
    <link rel="icon" href="天天科技.ico" type="image/x-icon">
    <style>
         body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #000000, #0f0033, #1a0066);
            opacity: 0.15;
            pointer-events: none;
        }

        /* 粒子动画 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(135deg, #00ffcc, #00ccff);
            border-radius: 50%;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.8;
            }
            50% {
                transform: translateY(-20vh) translateX(10vw) scale(1.5);
                opacity: 0.5;
            }
            100% {
                transform: translateY(-40vh) translateX(20vw) scale(1);
                opacity: 0;
            }
        }

        /* 通用样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
        }

        body {
            background: #000;
            overflow-x: hidden;
        }

        .header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-links a {
            margin: 0 15px;
            text-decoration: none;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -3px;
            width: 100%;
            height: 2px;
            background: linear-gradient(135deg, #00ffcc, #00ccff);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s;
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .main-banner {
            position: relative;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: url('tech-bg.jpg') no-repeat center center/cover;
            isolation: isolate;
        }

        .main-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.6));
            z-index: -1;
        }

        .big-title {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00ffcc, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-content {
            font-size: 1.5rem;
            max-width: 800px;
            margin: 0 auto;
            opacity: 0.8;
        }

        .tech-section {
            padding: 100px 5%;
            position: relative;
            overflow: hidden;
            z-index: 5;
        }

        .tech-section:nth-child(odd) {
            background: rgba(10, 0, 20, 0.9);
        }

        .tech-section:nth-child(even) {
            background: rgba(0, 0, 0, 0.9);
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -10px;
            width: 100%;
            height: 3px;
            background: linear-gradient(135deg, #00ffcc, #00ccff);
        }

        .content-block {
            max-width: 1200px;
            margin: 0 auto;
        }

        .content-text {
            font-size: 1.1rem;
            line-height: 1.8;
            opacity: 0.9;
        }

        .content-text p {
            margin-bottom: 20px;
        }

        .highlight {
            color: #00ffcc;
            font-weight: bold;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
        }

        .product-name {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #00ffcc;
        }

        .product-description {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .cta-button {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #00ffcc, #00ccff);
            color: #000;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }

        .page-footer {
            background: linear-gradient(135deg, #000, #2a2a5c);
            color: white;
            padding: 20px 5%;
            font-size: 16px;
            position: relative;
            z-index: 10;
        }

        .footer-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .footer-column h4 {
            margin-bottom: 10px;
            font-weight: 500;
        }

        .footer-column a {
            display: block;
            margin: 5px 0;
            color: #ccc;
            transition: color 0.3s;
        }

        .footer-column a:hover {
            color: white;
        }

        .social-links .social-icon {
            margin: 0 10px;
            color: #888;
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            transition: color 0.3s;
        }

        .social-links .social-icon:hover {
            color: white;
        }

        .region-lang a,
        .legal-links a {
            margin: 5px 10px;
            color: #888;
        }

        .region-lang a:hover,
        .legal-links a:hover {
            color: white;
        }

        .copyright p {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        .footer-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid #444;
        }

        @media (max-width: 768px) {
            .big-title {
                font-size: 2.5rem;
            }

            .sub-content {
                font-size: 1.2rem;
            }

            .product-card {
                padding: 20px;
            }
            .main-banner {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6)), url('al-studio-bg.jpg');
            background-size: cover;
            background-position: center;
            height: 90vh;
        }

        .product-hero {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding: 120px 20px 0;
        }

        .hero-title {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00ffcc, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.8rem;
            max-width: 800px;
            margin: 0 auto 60px;
            opacity: 0.9;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            transition: all 0.3s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .feature-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 15px 30px rgba(0, 255, 204, 0.2);
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #00ffcc, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .feature-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #00ffcc;
            flex: 0 0 auto;
        }

        .feature-description {
            flex: 1;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.7;
        }

        @media (max-width: 768px) {
            .feature-grid {
                grid-template-columns: 1fr;
            }

            .hero-title {
                font-size: 2.8rem;
            }

            .hero-subtitle {
                font-size: 1.4rem;
                margin-bottom: 40px;
            }

            .feature-card {
                padding: 25px;
            }
        }
        </style>
</head>
<body>
    <div class="particles"></div>
    <header class="header">

                </p>

        </section>
    </main>

    <script>
        const particles = [];
        const count = 150;
        const colors = ['#00ffcc', '#00ccff', '#0099ff'];

        for (let i = 0; i < count; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = Math.random() * 100 + 'vh';
            particle.style.animationDuration = Math.random() * 5 + 5 + 's';
            particle.style.animationDelay = -(Math.random() * 5) + 's';
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            document.querySelector('.particles').appendChild(particle);
            particles.push(particle);
        }
    </script>
</body>
</html>
