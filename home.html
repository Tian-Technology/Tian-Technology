    <style>
        body {
            font-family: '黑体', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

       .container {
            width: 90%;
            max-width: 1200px;
            margin: 5vh auto;
            background: linear-gradient(45deg, #2d2d2d, #111111);
            padding: 5%;
            box-shadow: 0 0 40px rgba(59, 221, 198, 0.3);
            border-radius: 20px;
            text-align: center;
            position: relative;
        }

       .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent, #3bddc633);
            mask: radial-gradient(circle, transparent 80%, #000 80%);
        }

        h1 {
            margin-bottom: 3rem;
            font-family: 'Microsoft YaHei', sans-serif;
            font-weight: bold;
            color: #3BDDC6;
            text-shadow: 0 0 10px #3BDDC6;
            font-size: 2.5rem;
        }

        h2 {
            font-family: 'Microsoft YaHei', sans-serif;
            font-weight: bold;
            color: #31ADE4;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            font-family: 'Microsoft YaHei', sans-serif;
            color: #fff;
            margin: 1.5rem 0;
        }

        a {
            display: inline-block;
            margin: 1rem;
            color: #3BDDC6;
            text-decoration: none;
            transition: all 0.3s;
            position: relative;
        }

        a::before {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #3BDDC6;
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        a:hover::before {
            transform: scaleX(1);
        }

        button {
            padding: 1.2em 3em;
            background: linear-gradient(135deg, #3BDDC6, #64A9FF);
            font-family: "微软雅黑";
            font-size: 1.1em;
            font-weight: bold;
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(59, 221, 198, 0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #2A6DEB, #4A90E2);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(59, 221, 198, 0.5);
        }

       .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        @media (max-width: 768px) {
            button {
                padding: 1em 2em;
                font-size: 1em;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 0.7rem;
            }

            p {
                font-size: 1em;
            }
        }

       .weekday-message {
            display: none;
            text-align: center;
            font-size: 2em;
            color: #3BDDC6;
            margin-top: 20vh;
        }
    </style>
